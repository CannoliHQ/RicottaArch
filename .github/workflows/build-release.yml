name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0)"
        required: true
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout cannoli
        uses: actions/checkout@v4
        with:
          repository: CannoliHQ/cannoli
          path: cannoli

      - name: Symlink cannoli for Gradle
        run: ln -s "$GITHUB_WORKSPACE/cannoli" "$GITHUB_WORKSPACE/../cannoli-launcher"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-36"

      - name: Apply patches
        run: bash scripts/apply-patches.sh

      - name: Build release APKs
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: android/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: android/build/outputs/apk/release/*.apk
